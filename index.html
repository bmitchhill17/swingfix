<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Swing Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1rem; }
    .app { max-width: 540px; margin: 0 auto; padding: 1.5rem 0; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #666; }
    .logo { font-size: 36px; margin-bottom: 8px; }
    .card { background: white; border: 1px solid #e8e8e8; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-label { font-size: 11px; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
    .fault-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fault-btn { background: #f9f9f7; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px 12px; cursor: pointer; text-align: left; transition: all 0.2s; }
    .fault-btn:hover { border-color: #2d7a4f; background: #f0f8f4; }
    .fault-btn .icon { font-size: 22px; margin-bottom: 6px; display: block; }
    .fault-btn .name { font-size: 13px; font-weight: 600; color: #1a1a1a; display: block; }
    .fault-btn .desc { font-size: 12px; color: #888; display: block; margin-top: 2px; }
    .progress-bar { width: 100%; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 2rem; }
    .progress-fill { height: 100%; background: #2d7a4f; border-radius: 2px; transition: width 0.4s ease; }
    .back-btn { background: transparent; border: none; cursor: pointer; font-size: 13px; color: #888; padding: 0 0 1rem 0; display: flex; align-items: center; gap: 4px; }
    .back-btn:hover { color: #1a1a1a; }
    .question-text { font-size: 17px; font-weight: 500; color: #1a1a1a; margin-bottom: 1.5rem; line-height: 1.5; }
    .option-btn { width: 100%; background: #f9f9f7; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px 16px; cursor: pointer; text-align: left; margin-bottom: 8px; font-size: 14px; color: #1a1a1a; transition: all 0.2s; line-height: 1.4; }
    .option-btn:hover { border-color: #2d7a4f; background: #f0f8f4; }
    .impact-fault-card { background: #fff8ec; border: 1px solid #f0d080; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .impact-fault-label { font-size: 11px; color: #a07800; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    .impact-fault-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .root-cause-card { background: #f0f8f4; border: 1px solid #b8dfc8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .root-cause-label { font-size: 11px; color: #2d7a4f; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    .root-cause-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    .root-cause-desc { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 10px; }
    .drill-box { background: white; border: 1px solid #e8e8e8; border-radius: 8px; padding: 10px 12px; }
    .drill-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .drill-name { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
    .drill-desc { font-size: 13px; color: #666; line-height: 1.5; }
    .restart-btn { width: 100%; background: transparent; border: 1px solid #ddd; border-radius: 10px; padding: 12px; cursor: pointer; font-size: 14px; color: #666; margin-top: 1rem; transition: background 0.2s; }
    .restart-btn:hover { background: #f0f0f0; }
    .ai-thinking { display: flex; align-items: center; gap: 10px; padding: 1rem 0; color: #888; font-size: 14px; }
    .spinner { width: 18px; height: 18px; border: 2px solid #eee; border-top-color: #2d7a4f; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #cc3333; margin-bottom: 1rem; }
    .result-intro { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 1.25rem; }
    .divider { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">⛳</div>
    <h1>Golf Swing Analyzer</h1>
    <p>Diagnose your swing fault and get personalized fixes</p>
  </div>

  <div id="screen-select">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <div class="section-label" style="margin-bottom:0;">What's happening to your ball?</div>
        <button id="handed-toggle" onclick="toggleHanded()" style="background:#f9f9f7; border:1px solid #e8e8e8; border-radius:20px; padding:5px 12px; font-size:12px; cursor:pointer; color:#666;">⛳ Right-handed</button>
      </div>
      <div class="fault-grid" id="fault-grid"></div>
    </div>
  </div>

<div id="screen-club" style="display:none">
    <button class="back-btn" onclick="restart()">← back</button>
    <div class="card">
      <div class="section-label">Which club are you hitting?</div>
      <div class="fault-grid">
        <button class="fault-btn" onclick="selectClub('Driver')">
          <span class="icon">🏌️</span>
          <span class="name">Driver</span>
          <span class="desc">1 wood, tee shots</span>
        </button>
        <button class="fault-btn" onclick="selectClub('Fairway wood or hybrid')">
          <span class="icon">🪵</span>
          <span class="name">Wood / Hybrid</span>
          <span class="desc">3, 5 wood, hybrids</span>
        </button>
        <button class="fault-btn" onclick="selectClub('Long iron')">
          <span class="icon">📏</span>
          <span class="name">Long iron</span>
          <span class="desc">3, 4, 5 iron</span>
        </button>
        <button class="fault-btn" onclick="selectClub('Mid or short iron')">
          <span class="icon">⛳</span>
          <span class="name">Mid / Short iron</span>
          <span class="desc">6, 7, 8, 9 iron</span>
        </button>
        <button class="fault-btn" onclick="selectClub('Wedge')">
          <span class="icon">🎯</span>
          <span class="name">Wedge</span>
          <span class="desc">PW, GW, SW, LW</span>
        </button>
        <button class="fault-btn" onclick="selectClub('All clubs')">
          <span class="icon">🔄</span>
          <span class="name">All clubs</span>
          <span class="desc">Happens with everything</span>
        </button>
      </div>
    </div>
  </div>
  
  <div id="screen-questions" style="display:none">
    <button class="back-btn" onclick="goBack()">← back</button>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="card">
      <div id="question-area"></div>
    </div>
  </div>

  <div id="screen-result" style="display:none">
    <button class="back-btn" onclick="restart()">← start over</button>
    <div class="card" id="result-area"></div>
    <button class="restart-btn" onclick="restart()">Analyze another fault</button>
  </div>
</div>

<script>
const faults = [
  { id: 'slice', icon: '↗', name: 'Slice', desc: 'Ball curves hard right' },
  { id: 'hook', icon: '↖', name: 'Hook', desc: 'Ball curves hard left' },
  { id: 'fat', icon: '⛳', name: 'Fat shot', desc: 'Hitting ground first' },
  { id: 'thin', icon: '—', name: 'Thin / topped', desc: 'Catching it too high' },
  { id: 'push', icon: '→', name: 'Push right', desc: 'Ball starts & stays right' },
  { id: 'pull', icon: '←', name: 'Pull left', desc: 'Ball starts & stays left' },
  { id: 'distance', icon: '📉', name: 'Loss of distance', desc: 'Not hitting it far enough' },
  { id: 'shank', icon: '⚡', name: 'Shank', desc: 'Hosel contact, wild right' },
];

const knowledgeBase = {
  slice: {
    impactFaults: [
      {
        name: 'Open clubface at impact',
        rootCauses: [
          { name: 'Weak grip', desc: 'Your hands are rotated too far to the left on the club, which makes it very difficult to square the face at impact.', drill: { name: 'Strong grip drill', desc: 'At address, rotate both hands to the right until you can see 2-3 knuckles on your lead hand. Hit 20 balls focusing on holding this grip throughout the swing.' } },
          { name: 'Failing to rotate forearms through impact', desc: 'The forearms need to rotate and release through the hitting zone. If they stay passive the face stays open and the ball goes right.', drill: { name: 'Forearm rotation drill', desc: 'Take slow half swings focusing on the feeling of your trail forearm rotating over your lead forearm just after impact. Gradually build to full speed.' } },
          { name: 'Cupped lead wrist at the top', desc: 'A cupped (bent back) lead wrist at the top of the backswing opens the clubface, making it very hard to square it back up before impact.', drill: { name: 'Flat wrist drill', desc: 'At the top of your backswing, pause and check that your lead wrist is flat or slightly bowed. Use a mirror or ask someone to film you from behind.' } },
          { name: 'Open clubface at address', desc: 'If the face is already aimed right at setup, it will likely still be open at impact regardless of how good the swing is.', drill: { name: 'Alignment stick drill', desc: 'Place a club along the face at address and check that it points at your target, not right of it. Groove the feeling of a square face before every shot.' } },
        ]
      },
      {
        name: 'Out-to-in swing path',
        rootCauses: [
          { name: 'Over the top move', desc: 'On the downswing the shoulders spin outward and the club is thrown over the correct plane, creating a steep out-to-in path that cuts across the ball.', drill: { name: 'Headcover under trail arm drill', desc: 'Place a headcover under your trail armpit and keep it there on the downswing. This forces your elbow to stay connected and prevents the over the top move.' } },
          { name: 'Shoulders opening too early', desc: 'The lead shoulder pulls away from the ball too soon on the downswing, dragging the club outside the ideal path.', drill: { name: 'Slow motion downswing drill', desc: 'Practice starting your downswing with your hips only, keeping your shoulders closed as long as possible. Do this in slow motion 10 times before each session.' } },
          { name: 'Weight hanging on trail foot', desc: 'Failing to shift weight to the lead side forces the body to compensate by swinging across the ball from outside to inside.', drill: { name: 'Step drill', desc: 'Start with feet together, step toward the target with your lead foot as you begin the downswing. This forces proper weight transfer and encourages an in-to-out or neutral path.' } },
        ]
      }
    ]
  },
  hook: {
    impactFaults: [
      {
        name: 'Closed clubface at impact',
        rootCauses: [
          { name: 'Strong grip', desc: 'Hands rotated too far to the right on the club cause the face to close through impact, sending the ball hard left.', drill: { name: 'Neutral grip drill', desc: 'Rotate both hands left at address until you can see only 1-2 knuckles on your lead hand. Hit 20 balls at 50% speed until the new grip feels natural.' } },
          { name: 'Overactive hands and forearms', desc: 'Rolling the forearms over aggressively through impact closes the face too quickly and too much, producing a hook.', drill: { name: 'Slow release drill', desc: 'Practice hitting punch shots with a shortened follow through, focusing on keeping the face looking at the target longer through impact rather than rotating over quickly.' } },
          { name: 'Bowed lead wrist at the top', desc: 'A bowed lead wrist at the top of the swing closes the clubface, making it arrive at impact already shut.', drill: { name: 'Wrist position check drill', desc: 'At the top of your backswing pause and check your lead wrist is flat, not bowed forward. Film yourself from behind to check this position regularly.' } },
          { name: 'Closed clubface at address', desc: 'Starting with the face aimed left of target means it is likely to be even more closed at impact.', drill: { name: 'Face check drill', desc: 'Before every shot use a club laid along the face to verify it is aimed at the target, not left of it. Build this into your pre-shot routine.' } },
        ]
      },
      {
        name: 'In-to-out swing path',
        rootCauses: [
          { name: 'Trail elbow too far behind body', desc: 'When the trail elbow gets stuck too far behind the body on the downswing it forces the club to track too far to the right, creating an exaggerated in-to-out path.', drill: { name: 'Elbow lead drill', desc: 'Feel like your trail elbow leads your trail hand on the downswing and points at the ground in front of the ball. Practice this move in slow motion 15 times.' } },
          { name: 'Body stalling through impact', desc: 'When the body rotation stops through the hitting zone the hands and forearms take over and flip the club, closing the face and sending the ball left.', drill: { name: 'Belt buckle drill', desc: 'Focus on rotating your belt buckle to face the target at impact and beyond. If the buckle stalls, the hands flip. Keep turning all the way to a full balanced finish.' } },
          { name: 'Early extension', desc: 'The hips thrusting toward the ball on the downswing blocks the body from rotating properly, causing the arms to swing too far from the inside.', drill: { name: 'Chair drill', desc: 'Place a chair just behind your trail hip at address. Practice making swings without your hips bumping back into the chair on the downswing. This keeps you in posture and rotating correctly.' } },
        ]
      }
    ]
  },
  fat: {
    impactFaults: [
      {
        name: 'Low point too far behind the ball',
        rootCauses: [
          { name: 'Weight hanging on trail foot', desc: 'Failing to shift weight to the lead side causes the swing to bottom out behind the ball rather than in front of or at it.', drill: { name: 'Lead foot only drill', desc: 'Hit short irons standing only on your lead foot. This forces you to feel what proper weight transfer and a forward low point feels like.' } },
          { name: 'Reverse pivot', desc: 'Shifting weight to the lead foot on the backswing and then falling back to the trail foot on the downswing is the opposite of what should happen, causing the club to hit the ground early.', drill: { name: 'Feet together drill', desc: 'Hit shots with your feet together. This eliminates the ability to sway and forces your weight to transfer correctly through the ball.' } },
          { name: 'Casting the club', desc: 'Releasing the wrist hinge too early on the downswing throws the club head away from the body too soon and causes it to bottom out well before the ball.', drill: { name: 'Lag drill', desc: 'On the downswing feel like you are holding the angle between your lead arm and the club shaft as long as possible before releasing through impact. Practice half swings focusing only on this feeling.' } },
        ]
      },
      {
        name: 'Swing arc too wide and deep',
        rootCauses: [
          { name: 'Standing too close to the ball', desc: 'Being too close forces the swing to bottom out behind the ball as the club has nowhere to go but into the ground early.', drill: { name: 'Arm hang drill', desc: 'At address let your arms hang naturally from your shoulders, then grip the club. If you have to reach out or bend your arms significantly you are standing at the wrong distance.' } },
          { name: 'Early extension', desc: 'Hips thrusting toward the ball on the downswing pushes the whole swing arc forward and into the ground behind the ball.', drill: { name: 'Posture hold drill', desc: 'Set up in your address posture and focus on maintaining the exact same spine angle and hip distance from the ball all the way through impact. Film from the side to check.' } },
          { name: 'Swaying off the ball on the backswing', desc: 'Moving the entire body laterally away from the target on the backswing shifts the low point of the swing back with it, causing fat contact.', drill: { name: 'Trail knee drill', desc: 'On the backswing feel like your trail knee stays in the same position it was at address. If the knee straightens and the hip sways out, you are swaying.' } },
        ]
      }
    ]
  },
  thin: {
    impactFaults: [
      {
        name: 'Low point too far forward',
        rootCauses: [
          { name: 'Weight too far forward at address', desc: 'Starting with too much weight on the lead foot moves the bottom of the swing arc forward, causing the club to already be rising when it reaches the ball.', drill: { name: 'Even weight drill', desc: 'At address feel 50/50 weight distribution between both feet for irons. Use a mirror to check your head is centered over the ball, not ahead of it.' } },
          { name: 'Ball positioned too far back in stance', desc: 'With the ball too far back the club has already passed its low point before reaching the ball and is on the way up, striking the ball thin.', drill: { name: 'Ball position drill', desc: 'For mid irons the ball should be in the center of your stance. Place two alignment sticks on the ground to mark ball position and practice hitting from the correct spot.' } },
          { name: 'Sliding hips too far forward', desc: 'Over-sliding the hips toward the target on the downswing moves the low point of the arc too far forward and causes the club to be rising at impact.', drill: { name: 'Rotation over slide drill', desc: 'Feel like your hips rotate rather than slide on the downswing. Imagine your lead hip turning behind you rather than moving toward the target. Practice slow motion swings focusing on this.' } },
        ]
      },
      {
        name: 'Swing arc too narrow and shallow',
        rootCauses: [
          { name: 'Lifting up through impact', desc: 'Trying to help the ball into the air by raising the body through impact narrows the swing arc and causes the club to strike the top of the ball.', drill: { name: 'Stay down drill', desc: 'Focus on keeping your head and spine at the same height through impact. A good thought is to try to see the club contact the ball before you look up at the shot.' } },
          { name: 'Loss of posture', desc: 'The spine angle rising during the downswing brings the club up with it, causing thin contact or a complete top.', drill: { name: 'Spine angle drill', desc: 'Set up to the ball and hold your finish position. Check that your spine is still tilted forward at the same angle it was at address. If you are standing straight up you have lost posture.' } },
          { name: 'Standing too far from the ball', desc: 'Reaching for the ball causes tension in the arms and promotes a swing that bottoms out further from the body, often resulting in thin contact.', drill: { name: 'Arm hang drill', desc: 'Let your arms hang naturally from your shoulders at address before gripping. Add just a slight forward bend from the hips and flex in the knees. Do not reach for the ball.' } },
          { name: 'Early extension', desc: 'Hips thrusting toward the ball push the whole arc up and outward, resulting in the club catching the ball on the upswing.', drill: { name: 'Hip rotation drill', desc: 'Place a ball or headcover behind your trail hip. On the downswing rotate your hips without letting them push forward into the ball. The object behind the hip should not be knocked away.' } },
        ]
      }
    ]
  },
  push: {
    impactFaults: [
      {
        name: 'Clubface open relative to swing path',
        rootCauses: [
          { name: 'Blocked rotation through impact', desc: 'The hips and body stop rotating through the hitting zone, leaving the face open and pushing the ball to the right.', drill: { name: 'Belt buckle drill', desc: 'Focus on rotating your belt buckle to face the target at and through impact. Count to yourself — if the buckle stalls before the target line, your rotation is stopping too early.' } },
          { name: 'Failing to rotate forearms', desc: 'The forearms need to rotate through impact to square the face. If they remain passive the face stays open relative to the path and the ball goes right.', drill: { name: 'Forearm rotation drill', desc: 'Make slow half swings focusing on the feeling of the trail forearm rotating over the lead forearm just after impact. Gradually build speed over 20 repetitions.' } },
          { name: 'Weak grip', desc: 'Hands rotated too far left on the club make it very hard to square or close the face at impact, leaving it open and pushing the ball right.', drill: { name: 'Strong grip drill', desc: 'Rotate both hands to the right at address until you can see 2-3 knuckles on your lead hand. Hit 10 balls at half speed to adjust to the new grip feel.' } },
        ]
      },
      {
        name: 'Swing path too far in-to-out',
        rootCauses: [
          { name: 'Trail elbow too far from body', desc: 'The trail elbow getting stuck behind the body on the downswing forces the club to track too far to the right of the target line through impact.', drill: { name: 'Elbow tuck drill', desc: 'On the downswing feel your trail elbow brush against your trail hip. This keeps the elbow in front of the body and prevents an exaggerated in-to-out path.' } },
          { name: 'Shoulder alignment too far right', desc: 'Setting up with the shoulders aimed to the right of the target naturally promotes an in-to-out swing path and a push.', drill: { name: 'Alignment check drill', desc: 'Place two alignment sticks on the ground — one at your feet and one at the ball pointing at the target. Check that your shoulders are parallel to the target line, not aimed right.' } },
          { name: 'Ball too far back in stance', desc: 'With the ball back in the stance the club is still moving on its inside to out arc and has not yet reached the point where the path straightens out toward the target.', drill: { name: 'Ball position drill', desc: 'Move the ball forward in your stance by one ball width at a time and note how the start direction of the ball changes. Find the position where the ball starts on your target line.' } },
        ]
      }
    ]
  },
  pull: {
    impactFaults: [
      {
        name: 'Swing path too far out-to-in',
        rootCauses: [
          { name: 'Shoulders opening too early', desc: 'The lead shoulder pulling away from the ball too soon on the downswing throws the club outside the ideal path and cuts across the ball from out to in.', drill: { name: 'Shoulder delay drill', desc: 'On the downswing initiate the movement with your hips only and feel your shoulders stay closed as long as possible. Do this in slow motion 10 times before hitting balls.' } },
          { name: 'Overactive lead arm pull', desc: 'Pulling hard with the lead arm on the downswing drags the club across the ball from outside to inside, sending it left of the target.', drill: { name: 'Trail hand only drill', desc: 'Hit short chip shots using only your trail hand. This trains you to feel the trail side pushing through the ball rather than the lead side pulling, which balances out the swing direction.' } },
          { name: 'Ball too far forward in stance', desc: 'With the ball too far forward the club has already passed the bottom of its arc and is tracking back to the inside, pulling the ball left.', drill: { name: 'Ball position drill', desc: 'Move the ball back in your stance one ball width at a time. Notice how the start direction improves as the ball position moves toward the center of your stance.' } },
          { name: 'Alignment too far left', desc: 'If the body is aimed left of target at address the swing will naturally follow that line and the ball will start left.', drill: { name: 'Alignment stick drill', desc: 'Place an alignment stick at your feet pointing at a target. Check that the stick and your shoulders are parallel to the target line and not aimed left of it.' } },
        ]
      },
      {
        name: 'Clubface closed relative to swing path',
        rootCauses: [
          { name: 'Strong grip', desc: 'Hands rotated too far right on the club cause the face to close through impact and further left of the already left swing path.', drill: { name: 'Neutral grip drill', desc: 'Rotate both hands left at address until you can see only 1-2 knuckles on your lead hand. Hit chips and then full shots at reduced speed to adjust.' } },
          { name: 'Overactive forearm rotation', desc: 'Rolling the forearms over too aggressively through impact closes the face too much relative to the path, adding extra left curve to a ball already pulling left.', drill: { name: 'Firm lead wrist drill', desc: 'Focus on keeping your lead wrist firm and flat through impact rather than letting the trail hand roll over. Practice impact position holds at a slow speed.' } },
          { name: 'Closed clubface at address', desc: 'Starting with the face aimed left compounds the problem of an out-to-in path, sending the ball even further left.', drill: { name: 'Face square drill', desc: 'Before every shot lay a club across the face and verify it points at the target. Build this check into your pre-shot routine until a square face feels natural.' } },
        ]
      }
    ]
  },
  distance: {
    impactFaults: [
      {
        name: 'Loss of clubhead speed',
        rootCauses: [
          { name: 'Casting the club', desc: 'Releasing the wrist hinge too early on the downswing wastes the stored energy in the wrists before it can be delivered into the ball at maximum speed.', drill: { name: 'Lag and release drill', desc: 'On the downswing feel like you are holding the angle between your lead arm and the shaft as long as possible, then release it aggressively through the ball. Start with half swings and build up.' } },
          { name: 'Grip too tight', desc: 'Excessive grip pressure creates tension throughout the arms and shoulders which restricts the free movement needed to generate speed.', drill: { name: 'Grip pressure drill', desc: 'On a scale of 1-10 aim for a grip pressure of 4-5. Before each swing consciously relax your hands and arms. Shake them out if needed. Tension is a speed killer.' } },
          { name: 'Narrow swing arc', desc: 'Not fully extending the arms on the backswing creates a smaller arc which limits the distance the club can accelerate before impact.', drill: { name: 'Wide arc drill', desc: 'On the takeaway feel like you are pushing the club head as far away from your body as possible. The wider the arc on the backswing the more speed you can build on the way down.' } },
        ]
      },
      {
        name: 'Poor strike quality',
        rootCauses: [
          { name: 'Poor weight transfer', desc: 'Failing to shift weight properly to the lead side through impact reduces the power available at the point of contact.', drill: { name: 'Step through drill', desc: 'After impact let your trail foot step forward toward the target. This forces a full weight shift onto the lead side and trains the body to move through the ball correctly.' } },
          { name: 'Body rotation stalling', desc: 'When the body stops rotating through the hitting zone the arms slow down with it and the club loses speed before reaching the ball.', drill: { name: 'Full finish drill', desc: 'Every swing should finish with your weight on your lead foot, trail foot on its toe, and belt buckle facing the target. If you cannot hold a balanced finish your rotation is stalling.' } },
          { name: 'Poor distance from the ball', desc: 'Standing too close or too far from the ball prevents a centered strike on the sweet spot and causes significant distance loss even with good swing mechanics.', drill: { name: 'Arm hang drill', desc: 'At address let your arms hang naturally from your shoulders before gripping. This is the correct distance. Too much reaching or too much crowding will cost you distance.' } },
        ]
      }
    ]
  },
  shank: {
    impactFaults: [
      {
        name: 'Contact on the hosel',
        rootCauses: [
          { name: 'Standing too close to the ball', desc: 'Being too close to the ball at address puts the hosel directly in line with the ball, making hosel contact almost inevitable.', drill: { name: 'Toe contact drill', desc: 'Intentionally try to hit the ball off the toe of the club. This forces you to give yourself more room and naturally moves the contact point away from the hosel.' } },
          { name: 'Swaying toward the ball', desc: 'Moving the body laterally toward the ball on the downswing effectively moves the hosel into the path of the ball even if setup was correct.', drill: { name: 'Alignment stick barrier drill', desc: 'Place an alignment stick in the ground just outside the ball. Practice swings where the club never reaches the stick. This trains you to keep the swing arc away from the ball.' } },
          { name: 'Arms too far from the body', desc: 'Letting the arms drift away from the body on the downswing pushes the entire club outward and brings the hosel to the ball rather than the face.', drill: { name: 'Towel drill', desc: 'Tuck a small towel under both armpits at address and keep it there through the swing. If it falls out your arms have separated from your body. Hit 20 balls with the towel.' } },
        ]
      },
      {
        name: 'Swing path too far outside',
        rootCauses: [
          { name: 'Over the top move', desc: 'The club being thrown over the top on the downswing creates a path that approaches the ball from too far outside, leading the hosel into contact before the face.', drill: { name: 'Headcover drill', desc: 'Place a headcover just outside the ball on the target line. Make swings where the club approaches from the inside and misses the headcover. This trains an in-to-out or neutral path.' } },
          { name: 'Weight too far on toes', desc: 'Being balanced on the toes at address and through the swing causes the body to fall forward toward the ball, moving the hosel into impact.', drill: { name: 'Heel pressure drill', desc: 'At address feel slightly more pressure in your heels than your toes. Check this before every shot. During the swing maintain this heel pressure to prevent falling forward.' } },
          { name: 'Early extension toward ball', desc: 'The hips and body thrusting toward the ball on the downswing moves the entire swing arc outward and increases the chance of hosel contact.', drill: { name: 'Posture maintenance drill', desc: 'Set up to the ball and focus on keeping the same distance between your hips and the ball through the entire swing. Any move toward the ball will bring the hosel closer to the ball too.' } },
        ]
      }
    ]
  }
};

let selectedFault = null;
let conversationHistory = [];
let answersSoFar = [];
let questionsSoFar = [];
let isLeftHanded = false;
let selectedClub = null;

function toggleHanded() {
  isLeftHanded = !isLeftHanded;
  document.getElementById('handed-toggle').textContent = isLeftHanded ? '⛳ Left-handed' : '⛳ Right-handed';
}

function renderFaultGrid() {
  document.getElementById('fault-grid').innerHTML = faults.map(f => `
    <button class="fault-btn" onclick="selectFault('${f.id}', '${f.name}', '${f.desc}')">
      <span class="icon">${f.icon}</span>
      <span class="name">${f.name}</span>
      <span class="desc">${f.desc}</span>
    </button>
  `).join('');
}

function selectFault(id, name, desc) {
  selectedFault = { id, name, desc };
  conversationHistory = [];
  answersSoFar = [];
  questionsSoFar = [];
  selectedClub = null;
  showScreen('club');
}

function selectClub(club) {
  selectedClub = club;
  showScreen('questions');
  askQuestion();
}

function showScreen(name) {
  document.getElementById('screen-select').style.display = name === 'select' ? '' : 'none';
  document.getElementById('screen-club').style.display = name === 'club' ? '' : 'none';
  document.getElementById('screen-questions').style.display = name === 'questions' ? '' : 'none';
  document.getElementById('screen-result').style.display = name === 'result' ? '' : 'none';
}

function updateProgress(pct) {
  document.getElementById('progress-fill').style.width = pct + '%';
}

function buildKnowledgeSummary() {
  const kb = knowledgeBase[selectedFault.id];
  return kb.impactFaults.map(impact => {
    const causes = impact.rootCauses.map(rc => rc.name).join(', ');
    return `Impact fault: "${impact.name}" — possible root causes: ${causes}`;
  }).join('\n');
}

async function askQuestion() {
  document.getElementById('question-area').innerHTML = '<div class="ai-thinking"><div class="spinner"></div> Analyzing your swing...</div>';
  updateProgress(20 + (answersSoFar.length * 20));

  const kb = buildKnowledgeSummary();

  const systemPrompt = `You are an expert PGA-level golf instructor diagnosing swing faults using a structured knowledge base.

The golfer is ${isLeftHanded ? 'LEFT-HANDED — all directions are mirrored' : 'RIGHT-HANDED'}.
Reported flight fault: "${selectedFault.name} — ${selectedFault.desc}"
Club being used: ${selectedClub}

Your knowledge base for this fault:
${kb}

Your job is to ask observable questions to determine which impact fault and root causes are most likely. 
Questions already asked: ${questionsSoFar.length ? questionsSoFar.join(' | ') : 'none'}
Answers so far: ${answersSoFar.length ? answersSoFar.map((a,i) => `Q${i+1}: ${a}`).join('; ') : 'none'}

Rules:
- ONLY ask questions about what the golfer can see by watching the ball in the air or on the ground. No exceptions.
- Allowed question topics: where the ball starts relative to the target (left, right, straight), when any curve happens (immediately, mid flight, late), how high or low the ball flies, how far offline the ball finishes, divot location (in front of ball, behind ball, no divot), whether the ball rolls out or stops quickly after landing
- NEVER ask about setup, address position, how far from the ball they stand, grip, posture, or anything they would have to look down or think about at address
- NEVER ask the golfer to compare this shot to what feels normal or what they usually do — for many golfers this fault IS normal and they have no reference point
- NEVER ask about what the golfer feels in their body during the swing — shoulder rotation, weight shift, arm position, or any other swing sensation
- If a potential root cause cannot be confirmed through ball flight observation alone, include it in the results anyway rather than asking about it
- Never repeat a question already asked
- If the answers so far clearly point to specific root causes, respond with DIAGNOSE instead of asking more questions
- Maximum 3 questions before diagnosing

If asking another question respond ONLY with:
{"action": "question", "question": "...", "options": ["...", "...", "..."]}

If ready to diagnose respond ONLY with:
{"action": "diagnose", "impactFault": "exact impact fault name from knowledge base", "rootCauses": ["exact root cause name 1", "exact root cause name 2", "exact root cause name 3"]}
List 3-5 most likely root causes ordered by likelihood. Use exact names from the knowledge base.`;

  try {
    const messages = conversationHistory.length ? conversationHistory : [{ role: 'user', content: 'Begin diagnosis.' }];
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        system: systemPrompt,
        messages
      })
    });

    if (!response.ok) throw new Error('API error ' + response.status);
    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);

    if (parsed.action === 'question') {
      questionsSoFar.push(parsed.question);
      conversationHistory.push({ role: 'assistant', content: text });
      renderQuestion(parsed);
    } else {
      showResult(parsed);
    }
  } catch (err) {
    document.getElementById('question-area').innerHTML = `
      <div class="error-msg">Error: ${err.message}</div>
      <button class="option-btn" onclick="askQuestion()">Try again</button>`;
  }
}

function renderQuestion(data) {
  document.getElementById('question-area').innerHTML = `
    <div class="question-text">${data.question}</div>
    ${data.options.map(opt => `<button class="option-btn" onclick="selectAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
  `;
}

function selectAnswer(answer) {
  answersSoFar.push(answer);
  conversationHistory.push({ role: 'user', content: answer });
  askQuestion();
}

function showResult(parsed) {
  updateProgress(100);
  showScreen('result');

  const kb = knowledgeBase[selectedFault.id];
  const impactFault = kb.impactFaults.find(f => f.name === parsed.impactFault) || kb.impactFaults[0];
  const rootCauses = parsed.rootCauses
    .map(name => impactFault.rootCauses.find(rc => rc.name === name))
    .filter(Boolean);

  if (rootCauses.length === 0) {
    rootCauses.push(...impactFault.rootCauses.slice(0, 3));
  }

  document.getElementById('result-area').innerHTML = `
    <div class="impact-fault-card">
      <div class="impact-fault-label">Impact fault identified</div>
      <div class="impact-fault-title">${impactFault.name}</div>
    </div>
    <p class="result-intro">Based on your answers, here are the most likely root causes. Review each one and try the drill for whichever feels most relevant to your swing.</p>
    ${rootCauses.map((rc, i) => `
      <div class="root-cause-card">
        <div class="root-cause-label">Likely cause ${i + 1}</div>
        <div class="root-cause-title">${rc.name}</div>
        <div class="root-cause-desc">${rc.desc}</div>
        <div class="drill-box">
          <div class="drill-label">Drill</div>
          <div class="drill-name">${rc.drill.name}</div>
          <div class="drill-desc">${rc.drill.desc}</div>
        </div>
      </div>
    `).join('')}
  `;
}

function goBack() {
  if (answersSoFar.length === 0) { restart(); return; }
  answersSoFar.pop();
  questionsSoFar.pop();
  conversationHistory.pop();
  conversationHistory.pop();
  askQuestion();
}

function restart() {
  selectedFault = null;
  conversationHistory = [];
  answersSoFar = [];
  questionsSoFar = [];
  selectedClub = null;
  showScreen('select');
  updateProgress(0);
}

renderFaultGrid();
</script>
</body>
</html>
